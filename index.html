<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAIJU RAMPAGE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column}
#hud{display:none;justify-content:space-between;padding:8px 14px;color:#fff;font-size:11px;text-shadow:0 0 4px #000;flex-wrap:wrap;gap:4px}
.hb{background:rgba(0,0,0,.65);padding:4px 8px;border-radius:4px}
.bar{width:100px;height:8px;background:#222;border:1px solid #555;display:inline-block;vertical-align:middle;border-radius:2px;overflow:hidden}
.bar div{height:100%;transition:width .12s}
#boss-hud{display:none;text-align:center;padding:3px}
#hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:10px;text-align:center}
#title,#go,#sc{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);color:#fff;pointer-events:auto;z-index:10}
#title h1{font-size:min(48px,8vw);color:#0cf;text-shadow:0 0 30px #0af,0 0 60px #06f;letter-spacing:8px}
#title p{margin-top:12px;font-size:13px;color:#999;letter-spacing:3px}
.btn{margin-top:24px;padding:10px 36px;font-size:16px;font-family:inherit;background:linear-gradient(180deg,#0cf,#08a);color:#fff;border:none;cursor:pointer;letter-spacing:3px;border-radius:3px;pointer-events:auto}
#go h2{font-size:36px;color:#f44;text-shadow:0 0 20px #f00}
#sc h2{font-size:36px;color:#0f0;text-shadow:0 0 20px #0f0}
.scr{font-size:18px;margin-top:10px;color:#fe0}
#touch{display:none;position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
/* LEFT: D-pad cross controller */
#dpad{position:absolute;bottom:20px;left:20px;width:160px;height:160px;pointer-events:auto}
.dp{position:absolute;width:52px;height:52px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.18);color:rgba(255,255,255,.65);font-size:18px;font-weight:bold;display:flex;align-items:center;justify-content:center;font-family:inherit}
.dp:active,.dp.act{background:rgba(255,255,255,.28)}
#dp-u{left:54px;top:0;border-radius:8px 8px 0 0}
#dp-d{left:54px;bottom:0;border-radius:0 0 8px 8px}
#dp-l{left:0;top:54px;border-radius:8px 0 0 8px}
#dp-r{right:0;top:54px;border-radius:0 8px 8px 0}
#dp-c{left:54px;top:54px;width:52px;height:52px;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:0}
/* RIGHT: action buttons triangle layout */
#actpad{position:absolute;bottom:20px;right:20px;width:170px;height:160px;pointer-events:auto}
.ab{position:absolute;width:60px;height:60px;border-radius:50%;border:2px solid;font-size:11px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:inherit;gap:1px}
.ab:active,.ab.act{filter:brightness(1.8)}
#ab-arm{right:0;top:0;background:rgba(255,100,80,.15);border-color:rgba(255,100,80,.4);color:#f86}
#ab-tail{left:0;bottom:30px;background:rgba(80,255,80,.12);border-color:rgba(80,255,80,.35);color:#6f6}
#ab-beam{right:0;bottom:0;background:rgba(0,180,255,.15);border-color:rgba(0,180,255,.4);color:#0bf}
.ab-icon{font-size:20px;line-height:1}
.ab-lbl{font-size:9px;opacity:.7}
@media(hover:none)and(pointer:coarse),screen and (max-width:1024px) and (orientation:landscape),screen and (max-width:768px){#touch{display:block}#hint{display:none}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hb">HP <div class="bar"><div id="hp-bar" style="width:100%;background:#0c0"></div></div> <span id="hp-t">100</span></div>
    <div class="hb" id="sc-d">0</div>
    <div class="hb">BEAM <div class="bar"><div id="bm-bar" style="width:100%;background:#0af"></div></div></div>
    <div class="hb" id="st-d">STAGE 1</div>
  </div>
  <div id="boss-hud"><div class="hb" style="display:inline-block"><span id="bn">BOSS</span> <div class="bar" style="width:180px"><div id="bb2" style="width:100%;background:#e33"></div></div></div></div>
  <div id="hint">← → 移動 ｜ ↓ しゃがみ ｜ SPACE ジャンプ ｜ Z 腕 ｜ X 回転尻尾 ｜ C 光線</div>
</div>
<div id="title"><h1>KAIJU RAMPAGE</h1><p>街を破壊せよ</p><button class="btn" onclick="startGame()">START</button></div>
<div id="go" style="display:none"><h2>GAME OVER</h2><div class="scr" id="fs"></div><button class="btn" onclick="startGame()">RETRY</button></div>
<div id="sc" style="display:none"><h2>STAGE CLEAR!</h2><div class="scr" id="cs"></div><button class="btn" id="nb" onclick="nextStage()">NEXT</button></div>
<div id="touch">
  <div id="dpad">
    <div class="dp" id="dp-u">▲</div>
    <div class="dp" id="dp-l">◀</div>
    <div id="dp-c"></div>
    <div class="dp" id="dp-r">▶</div>
    <div class="dp" id="dp-d">▼</div>
  </div>
  <div id="actpad">
    <div class="ab" id="ab-arm"><span class="ab-icon">👊</span><span class="ab-lbl">ARM</span></div>
    <div class="ab" id="ab-tail"><span class="ab-icon">🔄</span><span class="ab-lbl">TAIL</span></div>
    <div class="ab" id="ab-beam"><span class="ab-icon">⚡</span><span class="ab-lbl">BEAM</span></div>
  </div>
</div>

<script>
const CV=document.getElementById('game'),X=CV.getContext('2d');
function resize(){CV.width=Math.min(innerWidth,1200);CV.height=Math.min(innerHeight,700)}
resize();addEventListener('resize',resize);
const G=.6,GYR=.82,STAGES=4;
let state='title',score=0,stage=1,camX=0,stageLen=8000,
    particles=[],explosions=[],shake=0,
    objects=[],enemies=[],projectiles=[],boss=null,kaiju=null,stageType='city',
    warningTimer=0,warningShown=false,bossActive=false;
function gy(){return CV.height*GYR}
function srand(s){return()=>{s=Math.sin(s)*10000;return s-Math.floor(s)}}
function lerp(a,b,t){return a+(b-a)*t}

// ===== KAIJU =====
function mkKaiju(){return{x:150,y:gy()-140,vy:0,w:100,h:140,hp:100,maxHp:100,beam:100,maxBeam:100,onGround:false,facing:1,attacking:false,atkType:null,atkTimer:0,atkFrame:0,atkDur:0,beamActive:false,walkFrame:0,walkTimer:0,invincible:0,bodyTilt:0,crouching:false}}

// ===== DRAW PLAYER KAIJU =====
function drawPK(k){
  const sx=k.x-camX,sy=k.y;
  if(k.invincible>0&&Math.floor(k.invincible/3)%2)return;
  const base='#3a7050',dark='#1e4030',belly='#5aaa70',spine='#00ccff',scl='#2d5a40';

  // Determine effective facing during tail attack
  let ef=k.facing; // effective facing
  let tilt=0;
  if(k.attacking&&k.atkType==='tail'){
    const prog=k.atkFrame/k.atkDur;
    // Phase: 0-0.2 windup, 0.2-0.7 spin (facing flips), 0.7-1.0 recovery
    if(prog>.15&&prog<.75) ef=-k.facing; // flipped = tail now on attack side
    tilt=Math.sin(prog*Math.PI)*.25;
  }

  X.save();
  X.translate(sx+k.w/2,sy+k.h);
  const crouchScale=k.crouching?1.15:1;
  X.scale(ef*crouchScale,1);
  X.rotate(tilt);
  X.translate(-k.w/2,-k.h);

  // TAIL — from LOWER BACK, extends LEFT, ~1.5x body width, dorsal spines UP
  X.save();
  X.translate(12,k.h*.73); // anchor at lower back / hip
  const segs=14,segL=11;
  let pts=[[0,0]],cx2=0,cy2=0;
  for(let i=1;i<=segs;i++){
    const ang=Math.PI-.08*i; // left, curving downward
    cx2+=Math.cos(ang)*segL;
    cy2+=Math.sin(ang)*segL+1.0;
    pts.push([cx2,cy2]);
  }
  X.beginPath();X.moveTo(0,-10);
  pts.forEach(([px,py],i)=>{const t=10-i*.6;X.lineTo(px,py-t)});
  for(let i=pts.length-1;i>=0;i--){const t=10-i*.6;X.lineTo(pts[i][0],pts[i][1]+t)}
  X.closePath();
  const tG=X.createLinearGradient(0,0,pts[segs][0],pts[segs][1]);
  tG.addColorStop(0,base);tG.addColorStop(.7,dark);tG.addColorStop(1,'#152a1e');
  X.fillStyle=tG;X.fill();
  X.fillStyle=scl;
  for(let i=1;i<segs;i+=2){const[px,py]=pts[i];X.beginPath();X.arc(px,py,2.5,0,Math.PI*2);X.fill()}
  // Dorsal spines — perpendicular UPWARD from tail curve
  X.shadowColor=spine;X.shadowBlur=8;
  for(let i=1;i<segs-1;i++){
    const[px,py]=pts[i];const[px2,py2]=pts[i-1];
    const perpAng=Math.atan2(py-py2,px-px2)+Math.PI/2; // +PI/2 = UP side
    const spH=14-i*.7;const spW=spH*.4;
    const tipX=px+Math.cos(perpAng)*spH,tipY=py+Math.sin(perpAng)*spH;
    const sg=X.createLinearGradient(px,py,tipX,tipY);
    sg.addColorStop(0,base);sg.addColorStop(.4,spine);sg.addColorStop(1,'#6ef');
    X.fillStyle=sg;X.beginPath();
    X.moveTo(px-Math.cos(perpAng+.5)*spW,py-Math.sin(perpAng+.5)*spW);
    X.lineTo(tipX,tipY);
    X.lineTo(px+Math.cos(perpAng-.5)*spW,py+Math.sin(perpAng-.5)*spW);
    X.fill();
  }
  X.shadowBlur=0;
  X.strokeStyle=scl;X.lineWidth=2;X.beginPath();X.moveTo(0,0);pts.forEach(([px,py])=>X.lineTo(px,py));X.stroke();
  const lp=pts[segs];
  X.fillStyle=spine;X.shadowColor=spine;X.shadowBlur=6;
  X.beginPath();X.moveTo(lp[0]+4,lp[1]-5);X.lineTo(lp[0]-16,lp[1]);X.lineTo(lp[0]+4,lp[1]+5);X.fill();
  X.shadowBlur=0;
  X.restore();

  // LEGS — bent knees, digitigrade walk
  const wc=k.walkFrame;
  [[22,0],[55,Math.PI]].forEach(([lx,ph])=>{
    X.save();
    X.translate(lx,k.h*.55); // hip joint
    const hipAng=Math.sin(wc+ph)*.3;
    X.rotate(hipAng);
    // Thigh
    X.fillStyle=dark;
    X.beginPath();X.moveTo(-9,0);X.lineTo(9,0);X.lineTo(7,28);X.lineTo(-7,28);X.fill();
    X.fillStyle=base;X.beginPath();X.ellipse(0,3,11,8,0,0,Math.PI*2);X.fill();
    // Knee
    X.save();X.translate(0,28);
    const kneeAng=-Math.abs(Math.sin(wc+ph))*.5-.35;
    X.rotate(kneeAng);
    X.fillStyle=base;
    X.beginPath();X.moveTo(-7,0);X.lineTo(7,0);X.lineTo(5,24);X.lineTo(-5,24);X.fill();
    X.fillStyle=dark;X.beginPath();X.arc(0,0,6,0,Math.PI*2);X.fill();
    // Foot
    X.save();X.translate(0,24);
    X.rotate(-hipAng*.4-kneeAng*.3);
    X.fillStyle=dark;
    X.beginPath();X.moveTo(-6,0);X.lineTo(16,0);X.lineTo(20,6);X.lineTo(-8,6);X.fill();
    X.fillStyle='#ccc';
    X.beginPath();X.moveTo(16,0);X.lineTo(22,-4);X.lineTo(20,2);X.fill();
    X.beginPath();X.moveTo(11,0);X.lineTo(17,-2);X.lineTo(15,3);X.fill();
    X.beginPath();X.moveTo(6,0);X.lineTo(12,-3);X.lineTo(10,2);X.fill();
    X.restore();X.restore();X.restore();
  });

  // BODY
  X.fillStyle=base;X.beginPath();
  X.moveTo(15,k.h*.25);X.quadraticCurveTo(50,k.h*.14,75,k.h*.25);
  X.quadraticCurveTo(88,k.h*.5,70,k.h*.7);X.quadraticCurveTo(50,k.h*.8,20,k.h*.7);
  X.quadraticCurveTo(3,k.h*.5,15,k.h*.25);X.fill();
  X.fillStyle=scl;for(let r=0;r<5;r++)for(let c=0;c<4;c++){X.beginPath();X.arc(25+c*14+(r%2)*7,k.h*.3+r*15,3.5,0,Math.PI*2);X.fill()}
  X.fillStyle=belly;X.beginPath();X.moveTo(40,k.h*.35);X.quadraticCurveTo(68,k.h*.35,65,k.h*.55);X.quadraticCurveTo(60,k.h*.72,40,k.h*.72);X.quadraticCurveTo(30,k.h*.55,40,k.h*.35);X.fill();
  X.strokeStyle='#4b8860';X.lineWidth=1;for(let i=0;i<5;i++){X.beginPath();X.moveTo(38,k.h*.38+i*12);X.lineTo(60,k.h*.38+i*12);X.stroke()}

  // SPINES
  X.shadowColor=spine;X.shadowBlur=10;
  [[18,k.h*.22,10],[24,k.h*.17,15],[32,k.h*.13,20],[40,k.h*.11,23],[48,k.h*.13,20],[54,k.h*.17,15],[60,k.h*.22,10]].forEach(([px,py,sz])=>{
    const g2=X.createLinearGradient(px,py-sz,px,py);g2.addColorStop(0,spine);g2.addColorStop(.5,'#6ef');g2.addColorStop(1,base);
    X.fillStyle=g2;X.beginPath();X.moveTo(px-sz*.35,py);X.quadraticCurveTo(px-2,py-sz*.5,px,py-sz);X.quadraticCurveTo(px+2,py-sz*.5,px+sz*.35,py);X.fill();
  });X.shadowBlur=0;

  // HEAD
  X.save();X.translate(k.w*.68,k.h*.12);
  X.fillStyle=base;X.beginPath();X.moveTo(-15,5);X.quadraticCurveTo(-18,-12,0,-14);X.quadraticCurveTo(20,-12,28,-2);X.quadraticCurveTo(30,8,20,14);X.lineTo(-10,14);X.quadraticCurveTo(-16,10,-15,5);X.fill();
  X.fillStyle=scl;X.beginPath();X.ellipse(15,0,8,6,.1,0,Math.PI*2);X.fill();
  X.fillStyle=dark;X.beginPath();X.moveTo(5,-8);X.quadraticCurveTo(20,-12,28,-4);X.lineTo(26,-1);X.quadraticCurveTo(18,-8,5,-5);X.fill();
  X.fillStyle='#111';X.beginPath();X.ellipse(10,-4,6,5,0,0,Math.PI*2);X.fill();
  X.fillStyle=spine;X.shadowColor=spine;X.shadowBlur=8;X.beginPath();X.ellipse(11,-4,3,4,0,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.beginPath();X.arc(12,-5,1.5,0,Math.PI*2);X.fill();X.shadowBlur=0;
  X.fillStyle=dark;X.beginPath();X.moveTo(0,10);X.lineTo(28,6);X.lineTo(30,12);X.lineTo(5,16);X.fill();
  X.fillStyle='#eee';for(let i=0;i<5;i++){X.beginPath();X.moveTo(8+i*4.5,8);X.lineTo(9.5+i*4.5,13);X.lineTo(11+i*4.5,8);X.fill()}
  for(let i=0;i<4;i++){X.beginPath();X.moveTo(10+i*4.5,12);X.lineTo(11.5+i*4.5,7.5);X.lineTo(13+i*4.5,12);X.fill()}
  X.restore();

  // ARMS
  const armSw=k.attacking&&k.atkType==='arm';
  X.save();X.translate(k.w*.62,k.h*.38);X.rotate(armSw?-1.2+k.atkFrame*.15:.4);
  X.fillStyle=base;X.beginPath();X.ellipse(8,0,8,5,.3,0,Math.PI*2);X.fill();
  X.fillStyle=dark;X.fillRect(12,-5,20,10);
  X.fillStyle='#ddd';[[32,-7,40,-10,38,-4],[32,-2,42,-2,38,3],[32,3,40,6,36,8]].forEach(([x1,y1,x2,y2,x3,y3])=>{X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.lineTo(x3,y3);X.fill()});
  X.restore();

  // BEAM
  if(k.beamActive){
    X.save();const bx=k.w*.85,by=k.h*.1;
    for(let l=3;l>=0;l--){const w=6+l*8;X.globalAlpha=l===0?1:.3;X.fillStyle=l===0?'#fff':spine;X.shadowColor=spine;X.shadowBlur=20+l*10;
      X.beginPath();X.moveTo(bx,by-w/4);X.lineTo(bx+420,by-w);X.lineTo(bx+420,by+w);X.lineTo(bx,by+w/4);X.fill()}
    X.globalAlpha=1;X.shadowBlur=0;
    for(let i=0;i<8;i++){X.fillStyle='#fff';X.beginPath();X.arc(bx+Math.random()*400,by+(Math.random()-.5)*30,1+Math.random()*2,0,Math.PI*2);X.fill()}
    X.restore();
  }
  X.restore();
}

// ===== BOSSES =====
function drawMecha(b){
  const sx=b.x-camX,sy=b.y,f=b.facing;if(b.invincible>0&&Math.floor(b.invincible/3)%2)return;
  X.save();X.translate(sx+b.w/2,sy+b.h/2);X.scale(f,1);X.translate(-b.w/2,-b.h/2);
  [[18],[52]].forEach(([lx])=>{X.save();X.translate(lx,b.h-40);X.fillStyle='#667';X.fillRect(-10,0,20,18);X.fillStyle='#556';X.fillRect(-8,16,16,22);X.strokeStyle='#889';X.lineWidth=3;X.beginPath();X.moveTo(-5,5);X.lineTo(-8,30);X.stroke();X.beginPath();X.moveTo(5,5);X.lineTo(8,30);X.stroke();X.fillStyle='#778';X.fillRect(-14,36,28,8);X.restore()});
  X.fillStyle='#778';X.beginPath();X.moveTo(10,b.h*.2);X.lineTo(30,b.h*.1);X.lineTo(70,b.h*.1);X.lineTo(90,b.h*.2);X.lineTo(85,b.h*.7);X.lineTo(15,b.h*.7);X.closePath();X.fill();
  X.fillStyle='#889';X.fillRect(20,b.h*.15,60,8);X.fillRect(20,b.h*.5,60,8);
  X.fillStyle='#f33';X.shadowColor='#f00';X.shadowBlur=15;X.beginPath();X.arc(50,b.h*.38,12,0,Math.PI*2);X.fill();
  X.fillStyle='#faa';X.beginPath();X.arc(50,b.h*.38,6,0,Math.PI*2);X.fill();X.shadowBlur=0;
  X.fillStyle='#667';X.beginPath();X.moveTo(30,b.h*.12);X.lineTo(40,b.h*.02);X.lineTo(65,b.h*.02);X.lineTo(70,b.h*.12);X.fill();
  X.fillStyle='#f44';X.shadowColor='#f00';X.shadowBlur=10;X.fillRect(38,b.h*.05,28,6);X.shadowBlur=0;
  X.fillStyle='#99a';X.beginPath();X.moveTo(50,b.h*.02);X.lineTo(48,-15);X.lineTo(52,-15);X.fill();
  const ar=b.attacking&&b.atkType==='arm'?-.8:.2;
  X.save();X.translate(80,b.h*.3);X.rotate(ar);X.fillStyle='#667';X.fillRect(0,-8,30,16);X.fillStyle='#556';X.fillRect(28,-6,15,12);X.fillStyle='#445';X.fillRect(40,-4,8,8);X.restore();
  if(b.beamActive){X.save();const bx=b.w*.9,by=b.h*.08;X.fillStyle='#f44';X.shadowColor='#f00';X.shadowBlur=20;X.beginPath();X.moveTo(bx,by-3);X.lineTo(bx+380,by-20);X.lineTo(bx+380,by+20);X.lineTo(bx,by+3);X.fill();X.fillStyle='#fcc';X.beginPath();X.moveTo(bx,by-1);X.lineTo(bx+380,by-8);X.lineTo(bx+380,by+8);X.lineTo(bx,by+1);X.fill();X.shadowBlur=0;X.restore()}
  X.restore();
}

// BATTLESHIP BOSS (Stage 2)
function drawBattleship(b){
  const sx=b.x-camX,sy=b.y;if(b.invincible>0&&Math.floor(b.invincible/3)%2)return;
  const f=b.facing;
  X.save();X.translate(sx+b.w/2,sy+b.h/2);X.scale(f,1);X.translate(-b.w/2,-b.h/2);
  const bw=b.w,bh=b.h;
  // Hull
  const hG=X.createLinearGradient(0,bh*.3,0,bh);
  hG.addColorStop(0,'#778');hG.addColorStop(.5,'#667');hG.addColorStop(1,'#445');
  X.fillStyle=hG;
  X.beginPath();X.moveTo(-20,bh*.5);X.lineTo(10,bh*.35);X.lineTo(bw-10,bh*.35);X.lineTo(bw+30,bh*.5);
  X.lineTo(bw+20,bh*.85);X.lineTo(-10,bh*.85);X.closePath();X.fill();
  // Waterline
  X.fillStyle='#922';X.beginPath();X.moveTo(-15,bh*.7);X.lineTo(bw+25,bh*.7);X.lineTo(bw+20,bh*.85);X.lineTo(-10,bh*.85);X.fill();
  // Deck
  X.fillStyle='#889';X.fillRect(5,bh*.35,bw-10,8);
  // Superstructure
  X.fillStyle='#99a';X.fillRect(bw*.3,bh*.1,bw*.4,bh*.28);
  X.fillStyle='#aab';X.fillRect(bw*.35,bh*.02,bw*.1,bh*.1);
  // Bridge windows
  X.fillStyle='#adf';for(let i=0;i<5;i++)X.fillRect(bw*.32+i*12,bh*.15,8,10);
  // Radar
  const ra=Date.now()*.002;
  X.save();X.translate(bw*.4,bh*.02);X.rotate(ra);
  X.strokeStyle='#bbc';X.lineWidth=2;X.beginPath();X.moveTo(-15,0);X.lineTo(15,0);X.stroke();X.restore();
  // Main gun turrets (3)

    objects.push({type:'station',x:1500+Math.random()*500,y:g-80,w:200,h:80,hp:8,maxHp:8});
    for(let i=0;i<2+s;i++)objects.push({type:'gastank',x:800+Math.random()*(stageLen-1600),y:g-50,w:50,h:50,hp:1,maxHp:1});
    for(let x=300;x<stageLen-400;x+=80+Math.random()*280)objects.push({type:'car',x,y:g-22,w:42,h:22,hp:1,maxHp:1,color:['#c33','#33c','#cc3','#3c3','#eee'][Math.floor(Math.random()*5)]});
    const tx=1500+Math.random()*500;for(let i=0;i<4;i++)objects.push({type:'train',x:tx+i*70,y:g-36,w:65,h:36,hp:2,maxHp:2,color:i===0?'#c63':'#6c9'});
    for(let i=0;i<3+s*2;i++)enemies.push({type:'tank',x:600+Math.random()*(stageLen-1200),y:g-25,w:55,h:25,hp:3,maxHp:3,speed:.5+Math.random()*.5,fireTimer:60+Math.random()*120|0,fireRate:90+Math.random()*60|0});
    for(let i=0;i<2+s;i++){const hy=g-200-Math.random()*100;enemies.push({type:'helicopter',x:800+Math.random()*(stageLen-1600),y:hy,w:64,h:28,hp:2,maxHp:2,speed:1+Math.random(),fireTimer:80+Math.random()*100|0,fireRate:80,baseY:hy,hoverPhase:Math.random()*Math.PI*2})}
  } else {
    // OCEAN STAGE
    // Warships
    for(let i=0;i<5;i++)objects.push({type:'ship',x:500+i*400+Math.random()*200,y:g-45,w:100,h:45,hp:4,maxHp:4});
    // Tankers
    for(let i=0;i<3;i++)objects.push({type:'tanker',x:700+i*600+Math.random()*300,y:g-55,w:120,h:55,hp:2,maxHp:2});
    // Helicopters
    for(let i=0;i<4;i++){const hy=g-200-Math.random()*100;enemies.push({type:'helicopter',x:500+Math.random()*(stageLen-1000),y:hy,w:64,h:28,hp:2,maxHp:2,speed:1+Math.random(),fireTimer:60+Math.random()*80|0,fireRate:70,baseY:hy,hoverPhase:Math.random()*Math.PI*2})}
    // Fighter jets
    for(let i=0;i<4;i++){const fy=g-250-Math.random()*120;enemies.push({type:'fighter',x:600+Math.random()*(stageLen-1200),y:fy,w:50,h:20,hp:2,maxHp:2,speed:2+Math.random(),fireTimer:50+Math.random()*80|0,fireRate:60,baseY:fy,hoverPhase:Math.random()*Math.PI*2})}
  }

  const bossHp=25+s*15;
  const bossNames=['MECHA GODZILLA','SUPER BATTLESHIP','KING GHIDORA','KUMONGA'];
  const bossW=s===2?180:100;
  const bossH=s===2?80:140;
  boss={x:stageLen-500,y:g-bossH,w:bossW,h:bossH,hp:bossHp,maxHp:bossHp,speed:s===2?.6:1,facing:-1,
    attacking:false,atkType:null,atkTimer:0,atkFrame:0,attackCooldown:120,
    beamActive:false,invincible:0,walkFrame:0,walkTimer:0,phase:1,name:bossNames[s-1]||'BOSS'};
}

  ['dp-u','Space'],['dp-d','ArrowDown'],['dp-l','ArrowLeft'],['dp-r','ArrowRight'],

// ===== Update =====
function update(){
  if(state!=='playing'||!kaiju)return;
  const g=gy();
  if(K['ArrowLeft']){kaiju.x-=(kaiju.crouching?2:4);kaiju.facing=-1}
  if(K['ArrowRight']){kaiju.x+=(kaiju.crouching?2:4);kaiju.facing=1}
  if(K['Space']&&kaiju.onGround&&!kaiju.crouching){kaiju.vy=-14;kaiju.onGround=false}
  // Crouch
  kaiju.crouching=K['ArrowDown']&&kaiju.onGround;
  if(kaiju.crouching){kaiju.h=90;kaiju.y=g-kaiju.h}else{if(kaiju.h!==140){kaiju.h=140;kaiju.y=g-kaiju.h}}
  if(K['KeyZ']&&!kaiju.attacking&&!kaiju.beamActive){kaiju.attacking=true;kaiju.atkType='arm';kaiju.atkTimer=15;kaiju.atkFrame=0;kaiju.atkDur=15}
  if(K['KeyX']&&!kaiju.attacking&&!kaiju.beamActive){kaiju.attacking=true;kaiju.atkType='tail';kaiju.atkTimer=28;kaiju.atkFrame=0;kaiju.atkDur=28}
  if(K['KeyC']&&!kaiju.attacking&&kaiju.beam>=2)kaiju.beamActive=true;
  if(!K['KeyC'])kaiju.beamActive=false;
  if(kaiju.beamActive){kaiju.beam-=.8;if(kaiju.beam<=0){kaiju.beam=0;kaiju.beamActive=false}}else kaiju.beam=Math.min(kaiju.maxBeam,kaiju.beam+.15);
  if(kaiju.attacking){kaiju.atkTimer--;kaiju.atkFrame++;if(kaiju.atkTimer<=0)kaiju.attacking=false}
  if(kaiju.invincible>0)kaiju.invincible--;
  kaiju.vy+=G;kaiju.y+=kaiju.vy;
  if(kaiju.y+kaiju.h>=g){kaiju.y=g-kaiju.h;kaiju.vy=0;kaiju.onGround=true}
  if(K['ArrowLeft']||K['ArrowRight']){kaiju.walkTimer++;kaiju.walkFrame=kaiju.walkTimer*.15}
  camX+=(kaiju.x-CV.width*.3-camX)*.1;camX=Math.max(0,Math.min(camX,stageLen-CV.width));

  // Attack collision
  let hb=null,dmg=0;
  if(kaiju.attacking){
    if(kaiju.atkType==='arm'&&kaiju.atkTimer>8){hb=armBox(kaiju);dmg=2}
    else if(kaiju.atkType==='tail'&&kaiju.atkFrame>4&&kaiju.atkFrame<22){hb=tailBox(kaiju);dmg=1.8}
  }
  if(kaiju.beamActive){hb=beamBox(kaiju);dmg=.2}
  if(hb){
    objects.forEach(o=>{if(o.hp>0&&overlap(hb,o)){o.hp-=dmg;if(kaiju.atkFrame%5===1){spawnP(o.x+o.w/2,o.y+o.h/3,4,'#aaa',4);shake=3}
      if(o.hp<=0){const pts={building:100*o.maxHp,gastank:200,station:500,ship:300,tanker:400}[o.type]||50;score+=pts;
        const heal={building:5,station:15,ship:8,tanker:0,gastank:0}[o.type]||2;
        kaiju.hp=Math.min(kaiju.maxHp,kaiju.hp+heal);spawnP(o.x+o.w/2,o.y+o.h/2,20,'#fa0',6);
        if(heal>0)spawnP(o.x+o.w/2,o.y+o.h/4,8,'#0f0',3);
        if(o.type==='gastank'||o.type==='tanker')spawnExp(o.x+o.w/2,o.y+o.h/2,200);else shake=8}}});
    enemies.forEach(e=>{if(e.hp>0&&overlap(hb,e)){e.hp-=dmg;if(e.hp<=0){score+={tank:150,helicopter:200,fighter:250}[e.type]||100;kaiju.hp=Math.min(kaiju.maxHp,kaiju.hp+3);spawnP(e.x+e.w/2,e.y+e.h/2,15,'#f80',5);spawnExp(e.x+e.w/2,e.y+e.h/2,80)}}});
    if(boss&&boss.hp>0&&overlap(hb,boss)){boss.hp-=dmg;if(kaiju.atkFrame%5===1){spawnP(boss.x+boss.w/2,boss.y+boss.h/3,6,'#f80',5);shake=4}}
  }
  objects.forEach(o=>{if(o.hp>0&&o.type==='car'&&overlap(kaiju,o)){o.hp=0;score+=30;kaiju.hp=Math.min(kaiju.maxHp,kaiju.hp+1);spawnP(o.x+o.w/2,o.y,8,'#aaa',3)}});

  // Enemies
  enemies.forEach(e=>{if(e.hp<=0)return;
    if(e.type==='tank'){const dx=kaiju.x-e.x;if(Math.abs(dx)<500)e.x+=(dx>0?-1:1)*e.speed;if(--e.fireTimer<=0){e.fireTimer=e.fireRate;const a=Math.atan2(kaiju.y+kaiju.h/2-(e.y+5),kaiju.x+kaiju.w/2-(e.x+45));projectiles.push({x:e.x+45,y:e.y+5,vx:Math.cos(a)*5,vy:Math.sin(a)*5,damage:5,life:120,r:4,color:'#ff0',from:'e'})}}
    if(e.type==='helicopter'){e.hoverPhase+=.03;e.y=e.baseY+Math.sin(e.hoverPhase)*20;const dx=kaiju.x-e.x;if(Math.abs(dx)<600)e.x+=(dx>0?1:-1)*e.speed*.5;if(--e.fireTimer<=0){e.fireTimer=e.fireRate;projectiles.push({x:e.x+20,y:e.y+25,vx:0,vy:4,damage:3,life:80,r:3,color:'#f44',from:'e'})}}
    if(e.type==='fighter'){
      const dx=kaiju.x-e.x,dist=Math.abs(dx);
      if(!e.diveState)e.diveState='cruise';
      if(!e.diveTimer)e.diveTimer=0;
      e.diveTimer++;
      if(e.diveState==='cruise'){
        // High altitude cruise, approach kaiju
        e.y+=(e.baseY-e.y)*.05; // return to base altitude
        e.x+=(dx>0?1:-1)*e.speed*1.2;
        // Start dive when close and timer ready
        if(dist<500&&e.diveTimer>120){e.diveState='dive';e.diveTimer=0;e.diveTarget=kaiju.y+kaiju.h*.2}
      }else if(e.diveState==='dive'){
        // Dive toward kaiju altitude
        const targetY=e.diveTarget||gy()-160;
        e.y+=(targetY-e.y)*.08;
        e.x+=(dx>0?1:-1)*e.speed*1.5;
        // Fire during dive
        if(e.diveTimer%20===0){const a=Math.atan2(kaiju.y+kaiju.h/2-e.y,kaiju.x+kaiju.w/2-e.x);projectiles.push({x:e.x,y:e.y+10,vx:Math.cos(a)*7,vy:Math.sin(a)*7,damage:4,life:80,r:3,color:'#ff8',from:'e'})}
        // Pull up after pass or timeout
        if(e.diveTimer>80||dist<50){e.diveState='pull';e.diveTimer=0}
      }else{
        // Pull up back to high altitude
        e.y+=(e.baseY-30-e.y)*.06;
        e.x+=(dx>0?-1:1)*e.speed*.8; // fly away
        if(e.diveTimer>90){e.diveState='cruise';e.diveTimer=0}
      }
      // Standard fire timer (less frequent during cruise)
      if(e.diveState==='cruise'&&--e.fireTimer<=0){e.fireTimer=e.fireRate;const a=Math.atan2(kaiju.y+kaiju.h/2-e.y,kaiju.x+kaiju.w/2-e.x);projectiles.push({x:e.x,y:e.y+10,vx:Math.cos(a)*7,vy:Math.sin(a)*7,damage:4,life:80,r:3,color:'#ff8',from:'e'})}
    }
  });

  // Boss warning
  // Boss warning — trigger based on fixed stage position, not moving boss
  if(boss&&boss.hp>0&&!warningShown&&kaiju.x>stageLen-1200){
    warningShown=true;warningTimer=180;
  }
  if(warningTimer>0)warningTimer--;
  if(warningShown&&warningTimer<=0)bossActive=true;

  // Boss AI — only after warning completes
  if(boss&&boss.hp>0&&bossActive){
    const dx=kaiju.x-boss.x,dist=Math.abs(dx);if(boss.invincible>0)boss.invincible--;
    boss.phase=boss.hp<boss.maxHp*.4?2:1;
    if(!boss.attacking){
      if(dist>200){boss.x+=(dx>0?1:-1)*boss.speed*(boss.phase===2?1.5:1);boss.facing=dx>0?1:-1;boss.walkTimer++;boss.walkFrame=boss.walkTimer*.12}
      if(--boss.attackCooldown<=0){boss.attacking=true;boss.atkType=dist<180?(Math.random()>.5?'arm':'beam'):'beam';boss.atkTimer=boss.atkType==='beam'?45:20;boss.atkFrame=0;boss.attackCooldown=boss.phase===2?50:90}
    }else{
      boss.atkTimer--;boss.atkFrame++;let bh=null;
      if(boss.atkType==='arm'&&boss.atkTimer>10)bh=armBox(boss);
      else if(boss.atkType==='beam'&&boss.atkTimer>10){boss.beamActive=true;bh=beamBox(boss)}
      if(bh&&overlap(bh,kaiju)&&kaiju.invincible<=0){kaiju.hp-=boss.atkType==='beam'?.35:8;kaiju.invincible=boss.atkType==='beam'?5:30;shake=6}
      if(boss.atkTimer<=0){boss.attacking=false;boss.beamActive=false}
    }
    if(boss.phase===2&&Math.random()<.015){const a=Math.atan2(kaiju.y+kaiju.h/2-(boss.y+20),kaiju.x+kaiju.w/2-(boss.x+boss.w/2));
      projectiles.push({x:boss.x+boss.w/2,y:boss.y+20,vx:Math.cos(a)*4,vy:Math.sin(a)*4,damage:8,life:100,r:6,color:['#f44','#ff8','#ff0','#a0f'][stage-1],from:'b'})}
  }
  if(boss&&boss.hp<=0&&boss.hp!==-999){boss.hp=-999;score+=1000*stage;spawnExp(boss.x+boss.w/2,boss.y+boss.h/2,300);
    setTimeout(()=>{state='stageclear';document.getElementById('sc').style.display='flex';document.getElementById('cs').textContent='SCORE: '+score;if(stage>=STAGES)document.getElementById('nb').textContent='ALL CLEAR!'},1000)}

  projectiles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;if((p.from==='e'||p.from==='b')&&kaiju.invincible<=0&&Math.abs(p.x-(kaiju.x+kaiju.w/2))<kaiju.w/2+5&&Math.abs(p.y-(kaiju.y+kaiju.h/2))<kaiju.h/2+5){kaiju.hp-=p.damage;kaiju.invincible=20;p.life=0;shake=3;spawnP(p.x,p.y,5,'#ff0',3)}});
  projectiles=projectiles.filter(p=>p.life>0);objects=objects.filter(o=>o.hp>0||o.type==='building');enemies=enemies.filter(e=>e.hp>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--});particles=particles.filter(p=>p.life>0);
  explosions.forEach(e=>e.life--);explosions=explosions.filter(e=>e.life>0);if(shake>0)shake--;

  if(kaiju.hp<=0){state='gameover';document.getElementById('go').style.display='flex';document.getElementById('fs').textContent='SCORE: '+score;document.getElementById('hud').style.display='none';document.getElementById('boss-hud').style.display='none'}
  document.getElementById('hp-bar').style.width=Math.max(0,kaiju.hp/kaiju.maxHp*100)+'%';
  document.getElementById('hp-bar').style.background=kaiju.hp>30?'#0c0':'#e33';
  document.getElementById('hp-t').textContent=Math.max(0,Math.round(kaiju.hp));
  document.getElementById('bm-bar').style.width=(kaiju.beam/kaiju.maxBeam*100)+'%';
  document.getElementById('sc-d').textContent='SCORE: '+score;
  document.getElementById('st-d').textContent='STAGE '+stage;
  if(boss&&boss.hp>0){document.getElementById('boss-hud').style.display='block';document.getElementById('bb2').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';document.getElementById('bn').textContent=boss.name}else document.getElementById('boss-hud').style.display='none';
}

// ===== Render =====
function render(){
  if(state==='title'||!kaiju){X.fillStyle='#000';X.fillRect(0,0,CV.width,CV.height);return}
  X.save();if(shake>0)X.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  const g=gy(),t=Date.now()*.001;

  if(stageType==='ocean'){
    // Ocean sky
    const sky=X.createLinearGradient(0,0,0,g);sky.addColorStop(0,'#0a1525');sky.addColorStop(.4,'#152540');sky.addColorStop(1,'#1a3050');
    X.fillStyle=sky;X.fillRect(0,0,CV.width,g);
    // Stars
    const sr=srand(42);X.fillStyle='rgba(255,255,255,.4)';for(let i=0;i<30;i++){X.beginPath();X.arc(sr()*CV.width,sr()*g*.4,sr()*1.5,0,Math.PI*2);X.fill()}
    // Moon
    X.fillStyle='rgba(200,215,240,.15)';X.beginPath();X.arc(CV.width*.8,50,30,0,Math.PI*2);X.fill();
    // Water
    const wG=X.createLinearGradient(0,g-20,0,CV.height);
    wG.addColorStop(0,'#0a2a4a');wG.addColorStop(.3,'#0a2040');wG.addColorStop(1,'#061530');
    X.fillStyle=wG;X.fillRect(0,g-20,CV.width,CV.height-g+20);
    // Waves
    X.strokeStyle='rgba(100,180,255,.15)';X.lineWidth=1;
    for(let row=0;row<6;row++){
      X.beginPath();
      for(let x2=0;x2<CV.width;x2+=2){
        const wy=g-10+row*15+Math.sin((x2+camX*.3)*0.02+t*2+row)*4+Math.sin((x2+camX*.5)*0.05+t*3)*2;
        x2===0?X.moveTo(x2,wy):X.lineTo(x2,wy);
      }X.stroke();
    }
    // Moon reflection
    X.fillStyle='rgba(200,215,240,.04)';
    for(let i=0;i<8;i++){X.fillRect(CV.width*.75+Math.sin(t+i)*10,g+i*12,40-i*3,3)}
  } else {
    // City sky
    const sky=X.createLinearGradient(0,0,0,g);sky.addColorStop(0,'#0a0a1e');sky.addColorStop(.3,'#1a1030');sky.addColorStop(.6,'#2a1535');sky.addColorStop(1,'#3a1a30');
    X.fillStyle=sky;X.fillRect(0,0,CV.width,g);
    const sr=srand(42);X.fillStyle='rgba(255,255,255,.4)';for(let i=0;i<40;i++){X.beginPath();X.arc(sr()*CV.width,sr()*g*.5,sr()*1.5,0,Math.PI*2);X.fill()}
    X.fillStyle='rgba(200,210,230,.12)';X.beginPath();X.arc(CV.width*.8,60,35,0,Math.PI*2);X.fill();
    // Parallax bg
    X.fillStyle='#0e0a18';for(let i=0;i<30;i++){const bx=i*130-(camX*.2)%130;X.fillRect(bx,g-30-(i*37%70),55,30+(i*37%70))}
    X.fillStyle='#1a1228';for(let i=0;i<22;i++){const bx=i*150-(camX*.4)%150;X.fillRect(bx,g-40-(i*53%90),65,40+(i*53%90))}
    X.fillStyle='#221830';for(let i=0;i<18;i++){const bx=i*180-(camX*.6)%180;X.fillRect(bx,g-50-(i*41%110),80,50+(i*41%110))}
    // Ground
    const gg=X.createLinearGradient(0,g,0,CV.height);gg.addColorStop(0,'#3a3a3a');gg.addColorStop(1,'#1a1a1a');
    X.fillStyle=gg;X.fillRect(0,g,CV.width,CV.height-g);
    X.fillStyle='#444';X.fillRect(0,g,CV.width,28);X.fillStyle='#aa0';for(let x2=-camX%50;x2<CV.width;x2+=50)X.fillRect(x2,g+12,25,3);
  }

  // Objects
  objects.forEach(o=>{if(o.x+o.w<camX-100||o.x>camX+CV.width+100)return;
    ({building:drawBuilding,station:drawStation,car:drawCar,train:drawTrain,gastank:drawGasTank,ship:drawShip,tanker:drawTanker})[o.type]?.(o)});
  enemies.forEach(e=>{if(e.x+e.w<camX-100||e.x>camX+CV.width+100)return;
    ({tank:drawTankE,helicopter:drawHeli,fighter:drawFighter})[e.type]?.(e)});
  drawBoss(boss);
  drawPK(kaiju);
  projectiles.forEach(drawProj);
  particles.forEach(p=>{X.globalAlpha=p.life/55;X.fillStyle=p.color;X.fillRect(p.x-camX-p.size/2,p.y-p.size/2,p.size,p.size)});X.globalAlpha=1;
  explosions.forEach(e=>{const pr=1-e.life/e.maxLife;X.globalAlpha=1-pr;const eg=X.createRadialGradient(e.x-camX,e.y,0,e.x-camX,e.y,e.radius*pr);eg.addColorStop(0,'rgba(255,255,200,.8)');eg.addColorStop(.3,'rgba(255,160,30,.5)');eg.addColorStop(1,'rgba(200,40,0,0)');X.fillStyle=eg;X.beginPath();X.arc(e.x-camX,e.y,e.radius*pr,0,Math.PI*2);X.fill();X.globalAlpha=1});
  // Rubble
  objects.forEach(o=>{if(o.type==='building'&&o.hp<=0){const sx=o.x-camX;X.fillStyle='#3a3530';X.fillRect(sx-5,g-12,o.w+10,12);X.fillStyle='#4a4540';for(let i=0;i<6;i++)X.fillRect(sx+Math.random()*o.w,g-8-Math.random()*16,8+Math.random()*12,6+Math.random()*8)}});

  // Water splash for ocean stage
  if(stageType==='ocean'){
    const ksx=kaiju.x-camX;
    if(kaiju.onGround){
      X.fillStyle='rgba(100,180,255,.15)';
      X.beginPath();X.ellipse(ksx+kaiju.w/2,g+5,kaiju.w*.8,10,0,0,Math.PI*2);X.fill();
    }
  }

  // === BOSS WARNING ===
  if(warningTimer>0){
    const prog=warningTimer/180;
    const flash=Math.floor(warningTimer/8)%2;
    // Dark overlay
    X.fillStyle=`rgba(0,0,0,${.3*prog})`;
    X.fillRect(0,0,CV.width,CV.height);
    // Red bar top & bottom
    const barH=40*prog;
    X.fillStyle=`rgba(180,0,0,${.6*prog})`;
    X.fillRect(0,CV.height/2-barH-20,CV.width,barH);
    X.fillRect(0,CV.height/2+20,CV.width,barH);
    // WARNING text
    if(flash){
      X.save();
      X.font=`bold ${Math.min(80,CV.width*.08)}px 'Courier New',monospace`;
      X.textAlign='center';X.textBaseline='middle';
      // Red glow
      X.shadowColor='#f00';X.shadowBlur=30;
      X.fillStyle='#f22';
      X.fillText('⚠ WARNING ⚠',CV.width/2,CV.height/2);
      // White inner
      X.shadowBlur=0;
      X.fillStyle=`rgba(255,255,255,${.5+prog*.5})`;
      X.font=`bold ${Math.min(74,CV.width*.07)}px 'Courier New',monospace`;
      X.fillText('⚠ WARNING ⚠',CV.width/2,CV.height/2);
      X.restore();
    }
    // Boss name (appears as warning fades)
    if(warningTimer<100&&boss){
      X.save();
      X.font=`bold ${Math.min(28,CV.width*.03)}px 'Courier New',monospace`;
      X.textAlign='center';X.textBaseline='middle';
      X.fillStyle=`rgba(255,200,0,${(100-warningTimer)/100})`;
      X.shadowColor='#fa0';X.shadowBlur=10;
      X.fillText(boss.name,CV.width/2,CV.height/2+50);
      X.shadowBlur=0;
      X.restore();
    }
    // Scan lines effect
    X.fillStyle=`rgba(255,0,0,${.03*prog})`;
    for(let y2=0;y2<CV.height;y2+=4)X.fillRect(0,y2,CV.width,2);
  }

  X.restore();
}

function loop(){update();render();requestAnimationFrame(loop)}
function startGame(){['title','go','sc'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('hud').style.display='flex';state='playing';score=0;stage=1;kaiju=mkKaiju();genStage(stage)}
function nextStage(){if(stage>=STAGES){document.getElementById('sc').style.display='none';document.getElementById('title').style.display='flex';document.getElementById('title').querySelector('p').textContent='FINAL SCORE: '+score;state='title';return}document.getElementById('sc').style.display='none';stage++;kaiju=mkKaiju();genStage(stage);state='playing'}
loop();
</script>
